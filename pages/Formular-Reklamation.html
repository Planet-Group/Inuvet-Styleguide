<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reklamationsformular – inuvet</title>
  <link rel="stylesheet" href="https://use.typekit.net/vhh5bbc.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="../inuvet.css">
</head>
<body>

<div class="form-page">
  <div class="form-page__card">

    <!-- Header -->
    <header class="form-page__header">
      <img src="../assets/graphics/Inuvet_Logo_RGB.svg" alt="inuvet Logo">
      <select class="form-lang-switch" aria-label="Sprache wählen">
        <option value="de" selected>Deutsch</option>
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="hu">Magyar</option>
        <option value="nl">Nederlands</option>
      </select>
    </header>

    <!-- Title -->
    <h1 class="form-page__title">Reklamationsformular</h1>

    <form id="reklamationForm" class="flow" novalidate>

      <!-- ── 1. Kontaktdaten ── -->
      <div class="form-field">
        <input type="text" id="belegnummer" name="belegnummer" placeholder=" " autocomplete="off">
        <label for="belegnummer">Belegnummer</label>
      </div>

      <h3 class="section-label --sub --in-view" data-animate="">Kontaktdaten</h3>

      <div class="form-grid">
        <div class="form-field">
          <input type="text" id="vorname" name="vorname" placeholder=" " autocomplete="given-name" required>
          <label for="vorname">Vorname</label>
        </div>
        <div class="form-field">
          <input type="text" id="nachname" name="nachname" placeholder=" " autocomplete="family-name" required>
          <label for="nachname">Nachname</label>
        </div>
        <div class="form-field" style="grid-column: span 2">
          <input type="text" id="plz-ort" name="plz_ort" placeholder=" " autocomplete="postal-code">
          <label for="plz-ort">Postleitzahl / Ort</label>
        </div>
        <div class="form-field" style="grid-column: span 2">
          <input type="email" id="email" name="email" placeholder=" " autocomplete="email" required>
          <label for="email">E-Mail-Adresse</label>
        </div>
      </div>

      <!-- ── 2. Liefer-/Fehlerdetails ── -->
      <h3 class="section-label --sub --in-view" data-animate="">Liefer- / Fehlerdetails</h3>

      <div class="form-check-group">
        <label class="form-check">
          <input type="checkbox" name="fehler" value="falschlieferung">
          <span>Falschlieferung</span>
        </label>
        <label class="form-check">
          <input type="checkbox" name="fehler" value="lieferschaeden">
          <span>Lieferschäden</span>
        </label>
        <label class="form-check">
          <input type="checkbox" name="fehler" value="produktmaengel">
          <span>Produktmängel</span>
        </label>
        <label class="form-check">
          <input type="checkbox" name="fehler" value="service-mhd-kl">
          <span>Service / MHD / KL</span>
        </label>
        <label class="form-check">
          <input type="checkbox" name="fehler" value="sonstiges">
          <span>Sonstiges</span>
        </label>
      </div>

      <!-- ── 3. Produktdetails ── -->
      <h3 class="section-label --sub --in-view" data-animate="">Produktdetails</h3>

      <div class="form-field">
        <input type="text" id="produktname" name="produktname" placeholder=" " required>
        <label for="produktname">Produktname</label>
      </div>

      <div class="form-grid">
        <div class="form-field">
          <input type="text" id="produktgroesse" name="produktgroesse" placeholder=" ">
          <label for="produktgroesse">Produktgröße</label>
        </div>
        <div class="form-field">
          <input type="text" id="chargennummer" name="chargennummer" placeholder=" ">
          <label for="chargennummer">Chargennummer</label>
        </div>
      </div>

      <div class="form-field">
        <input type="number" id="anzahl" name="anzahl" placeholder=" " min="1">
        <label for="anzahl">Anzahl</label>
      </div>

      <!-- ── 4. Fehlerbeschreibung ── -->
      <h3 class="section-label --sub --in-view" data-animate="">Fehlerbeschreibung</h3>

      <div class="form-field">
        <textarea id="fehlerbeschreibung" name="fehlerbeschreibung" placeholder=" " rows="5" required></textarea>
        <label for="fehlerbeschreibung">Detaillierte Fehlerbeschreibung</label>
      </div>

      <!-- ── 5. Foto hochladen ── -->
      <h3 class="section-label --sub --in-view" data-animate="">Foto hochladen</h3>

      <div class="form-upload" id="uploadZone">
        <input type="file" id="fotoInput" name="fotos" accept="image/*" multiple onchange="handleFiles(this.files)">
        <div class="form-upload__icon"><span class="material-icons">cloud_upload</span></div>
        <div class="form-upload__text"><strong>Foto wählen</strong> oder hierher ziehen</div>
        <div class="form-upload__hint">JPG, PNG — max. 10 MB pro Datei</div>
        <div class="form-upload__files" id="fileList"></div>
      </div>

      <!-- ── 6. Absenden ── -->
      <div class="form-captcha" aria-label="reCAPTCHA Sicherheitsabfrage (Platzhalter)">
        <div class="form-captcha__checkbox" role="presentation"></div>
        <span class="form-captcha__label">Ich bin kein Roboter.</span>
        <div class="form-captcha__brand">
          <span class="form-captcha__brand-logo" aria-hidden="true">🔒</span>
          <span class="form-captcha__brand-name">reCAPTCHA</span>
        </div>
      </div>

      <button type="submit" class="btn --primary --full">Absenden</button>

    </form>

  </div><!-- /.form-page__card -->

  <footer class="form-page__footer">
    <p><a href="https://www.inuvet.com/impressum" target="_blank" rel="noopener">Impressum</a> · <a href="https://www.inuvet.com/datenschutz" target="_blank" rel="noopener">Datenschutz</a></p>
  </footer>

</div><!-- /.form-page -->

<script src="../inuvet.js"></script>


<script src="formular-reklamation.js"></script>
</body>
</html>
